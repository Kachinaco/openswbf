<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OpenSWBF — Open-source reimplementation of Star Wars: Battlefront (2004) running in your browser via WebAssembly.">
  <title>OpenSWBF — Star Wars: Battlefront in Your Browser</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>&#x2B50;</text></svg>">
</head>
<body>

  <!-- Main game canvas -->
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-content">
      <h1 class="loading-title">OpenSWBF</h1>
      <p class="loading-subtitle">Star Wars: Battlefront in Your Browser</p>

      <div class="progress-container">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="progress-text" id="progress-text">Initializing...</p>
      </div>

      <div class="loading-footer">
        <a href="https://github.com/Kachinaco/openswbf" target="_blank" rel="noopener noreferrer" class="github-link">
          <svg class="github-icon" viewBox="0 0 16 16" width="18" height="18" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
              1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56
              .82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0
              1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          View on GitHub
        </a>
      </div>
    </div>
  </div>

  <!-- Instructions overlay (shown after loading, hidden on pointer lock) -->
  <div id="instructions-overlay" class="hidden">
    <div class="instructions-panel">
      <h2>Click to Play</h2>
      <div class="instructions-grid">
        <div class="instruction-item">
          <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
          <span>Move</span>
        </div>
        <div class="instruction-item">
          <kbd class="wide">Mouse</kbd>
          <span>Look around</span>
        </div>
        <div class="instruction-item">
          <kbd class="wide">Space</kbd>
          <span>Jump</span>
        </div>
        <div class="instruction-item">
          <kbd class="wide">Click</kbd>
          <span>Fire / Lock pointer</span>
        </div>
        <div class="instruction-item">
          <kbd class="wide">Esc</kbd>
          <span>Release pointer</span>
        </div>
      </div>
      <p class="instructions-hint">Click anywhere on the canvas to lock your pointer and begin.</p>
    </div>
  </div>

  <!-- Error overlay -->
  <div id="error-overlay" class="hidden">
    <div class="error-panel">
      <h2>Error</h2>
      <p id="error-message">An unexpected error occurred.</p>
      <button onclick="location.reload()">Reload</button>
    </div>
  </div>

  <script src="loader.js"></script>
  <script>
    (function () {
      'use strict';

      var loadingOverlay = document.getElementById('loading-overlay');
      var instructionsOverlay = document.getElementById('instructions-overlay');
      var errorOverlay = document.getElementById('error-overlay');
      var errorMessage = document.getElementById('error-message');
      var progressFill = document.getElementById('progress-fill');
      var progressText = document.getElementById('progress-text');
      var canvasEl = document.getElementById('canvas');

      // --- Progress reporting ---
      function setProgress(fraction, message) {
        var pct = Math.min(100, Math.max(0, Math.round(fraction * 100)));
        progressFill.style.width = pct + '%';
        if (message) {
          progressText.textContent = message;
        }
      }

      // --- Error handling ---
      function showError(msg) {
        errorMessage.textContent = msg;
        errorOverlay.classList.remove('hidden');
        loadingOverlay.classList.add('hidden');
      }

      window.onerror = function (msg) {
        showError('Runtime error: ' + msg);
      };

      // --- Pointer lock ---
      function requestPointerLock() {
        canvasEl.requestPointerLock =
          canvasEl.requestPointerLock ||
          canvasEl.mozRequestPointerLock ||
          canvasEl.webkitRequestPointerLock;
        if (canvasEl.requestPointerLock) {
          canvasEl.requestPointerLock();
        }
      }

      function onPointerLockChange() {
        var locked =
          document.pointerLockElement === canvasEl ||
          document.mozPointerLockElement === canvasEl ||
          document.webkitPointerLockElement === canvasEl;

        if (locked) {
          instructionsOverlay.classList.add('hidden');
        } else {
          if (!loadingOverlay.classList.contains('hidden')) return;
          instructionsOverlay.classList.remove('hidden');
        }
      }

      document.addEventListener('pointerlockchange', onPointerLockChange);
      document.addEventListener('mozpointerlockchange', onPointerLockChange);
      document.addEventListener('webkitpointerlockchange', onPointerLockChange);

      canvasEl.addEventListener('click', function () {
        if (!loadingOverlay.classList.contains('hidden')) return;
        requestPointerLock();
      });

      // --- Canvas sizing ---
      function resizeCanvas() {
        canvasEl.width = window.innerWidth;
        canvasEl.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // --- Emscripten Module ---
      setProgress(0.05, 'Loading engine...');

      var Module = {
        canvas: canvasEl,

        print: function (text) {
          console.log('[OpenSWBF]', text);
        },

        printErr: function (text) {
          console.error('[OpenSWBF]', text);
        },

        setStatus: function (text) {
          if (!text) return;
          // Emscripten status strings look like "Downloading data... (X/Y)"
          var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          if (match) {
            var current = parseFloat(match[2]);
            var total = parseFloat(match[4]);
            if (total > 0) {
              setProgress(current / total, match[1].trim());
            }
          } else {
            setProgress(0, text);
          }
        },

        onRuntimeInitialized: function () {
          setProgress(1.0, 'Ready!');

          setTimeout(function () {
            loadingOverlay.classList.add('hidden');
            instructionsOverlay.classList.remove('hidden');
            canvasEl.focus();
          }, 400);

          console.log('[OpenSWBF] WASM runtime initialized.');
        },

        onAbort: function (reason) {
          showError('Engine aborted: ' + reason);
        },

        locateFile: function (path) {
          return path;
        },

        monitorRunDependencies: function (left) {
          if (left === 0) {
            setProgress(0.95, 'Finalizing...');
          } else {
            setProgress(0.5 + (0.4 * (1 - left / 10)), 'Loading dependencies (' + left + ' remaining)...');
          }
        }
      };

      window.Module = Module;

      // --- Asset loader integration ---
      var assetLoader = new AssetLoader();
      assetLoader.setProgressCallback(function (loaded, total) {
        if (total > 0) {
          setProgress(0.1 + 0.4 * (loaded / total), 'Downloading assets... (' + formatBytes(loaded) + ' / ' + formatBytes(total) + ')');
        }
      });

      function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
      }

      // --- Load the Emscripten-generated JS ---
      setProgress(0.08, 'Fetching WASM module...');

      var script = document.createElement('script');
      script.src = 'openswbf.js';
      script.async = true;
      script.onerror = function () {
        showError('Failed to load openswbf.js. Make sure the WASM build output is in the web/ directory.');
      };
      document.body.appendChild(script);
    })();
  </script>

</body>
</html>
