name: Build WASM + Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wasm:
    name: Emscripten / WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56

      - name: Verify Emscripten
        run: emcc --version

      - name: Configure (CMake + Emscripten)
        run: emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-wasm -j$(nproc)

      - name: Assemble deployment directory
        run: |
          mkdir -p build-wasm/app/openswbf/
          # Copy web frontend files if they exist
          for f in index.html style.css loader.js sw.js; do
            if [ -f "web/$f" ]; then
              cp "web/$f" build-wasm/app/openswbf/
            fi
          done
          # List what we're deploying
          echo "=== Deployment contents ==="
          ls -lR build-wasm/app/openswbf/

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-wasm/app/openswbf

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-wasm
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
